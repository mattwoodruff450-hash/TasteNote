<!DOCTYPE html>
<html lang="en">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5efe6;color:#3a2218;font-family:Georgia,serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#f5efe6}::-webkit-scrollbar-thumb{background:#c9b09a;border-radius:3px}

.header{background:linear-gradient(180deg,#ede3d6,#f5efe6);border-bottom:1px solid #d9c8b4;padding:16px 20px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.app-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:300;color:#7a1a1a;letter-spacing:0.08em}
.app-sub{font-size:10px;color:#a08060;letter-spacing:0.2em;text-transform:uppercase;margin-top:2px}
.form-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:400;color:#7a1a1a;letter-spacing:0.05em}

.btn{background:#e8d8c4;color:#5a2a10;border:1px solid #c9b09a;padding:9px 16px;border-radius:4px;cursor:pointer;font-size:13px;font-family:Georgia,serif;letter-spacing:0.03em;transition:background 0.15s;white-space:nowrap}
.btn:hover{background:#d9c8b0}
.btn-primary{background:#7a1a1a;color:#f5ede0;border:1px solid #9b2a2a;padding:10px 22px;border-radius:4px;cursor:pointer;font-size:14px;font-family:Georgia,serif;font-weight:600;letter-spacing:0.04em;transition:background 0.15s;white-space:nowrap}
.btn-primary:hover{background:#8b2a2a}
.btn-primary:disabled{opacity:0.4;cursor:default}
.btn-danger{background:transparent;color:#8b3a2a;border:1px solid #c9b09a;padding:8px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-family:Georgia,serif}
.btn-danger:hover{background:#f0e4d4}

.search-bar{width:100%;background:#ede3d6;border:1px solid #c9b09a;border-radius:4px;color:#3a2218;padding:10px 14px;font-size:14px;font-family:Georgia,serif;outline:none;margin-top:12px}
.search-bar::placeholder{color:#b09878}
.search-bar:focus{border-color:#9b6040}
.sort-bar{display:flex;gap:8px;margin-top:10px}
.sort-btn{background:transparent;border:1px solid #c9b09a;color:#a08060;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;font-family:Georgia,serif;letter-spacing:0.05em;transition:all 0.15s}
.sort-btn.active{border-color:#7a1a1a;background:#e8d0c0;color:#7a1a1a}

.content{max-width:700px;margin:0 auto;padding:20px 16px;width:100%}
.form-content{max-width:700px;margin:0 auto;padding:20px 16px 60px;width:100%}

.wine-card{background:#ede3d6;border:1px solid #d9c8b4;border-radius:6px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s,background 0.15s;display:flex;align-items:center;overflow:hidden}
.wine-card:hover{border-color:#9b6040;background:#e8dace}
.card-photo{width:72px;height:72px;flex-shrink:0;overflow:hidden}
.card-photo img{width:100%;height:100%;object-fit:cover}
.card-dot-wrap{width:52px;height:72px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%}
.card-body{flex:1;padding:12px 12px 12px 4px;min-width:0}
.card-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;color:#7a1a1a;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:12px;color:#8b6848;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-aromas{font-size:11px;color:#a08060;font-style:italic;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{text-align:right;padding:12px 14px 12px 4px;flex-shrink:0}
.card-score{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;color:#7a1a1a;font-weight:300;line-height:1}
.card-quality{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
.card-date{font-size:10px;color:#b09878;margin-top:3px}

.empty-state{text-align:center;padding:70px 20px}
.empty-big{font-size:48px;margin-bottom:12px}
.empty-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;color:#c9b09a;font-weight:300;margin-bottom:8px}
.empty-sub{font-size:14px;color:#a08060}

.section{background:#ede3d6;border:1px solid #d9c8b4;border-radius:6px;padding:20px;margin-bottom:14px}
.section-head{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid #d9c8b4;padding-bottom:12px;margin-bottom:18px}
.sec-num{font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;color:#c9b09a;font-weight:300;line-height:1}
.sec-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:#7a1a1a;font-weight:600;letter-spacing:0.05em}
.sec-sub{font-size:11px;color:#a08060;font-style:italic;margin-top:2px}

.field{margin-bottom:16px}
label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8b6848;margin-bottom:6px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600}
.req{color:#8b1a1a;margin-left:4px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;background:#f5efe6;border:1px solid #c9b09a;border-radius:4px;color:#3a2218;padding:10px 12px;font-size:14px;font-family:Georgia,serif;outline:none;appearance:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#9b6040}
input::placeholder,textarea::placeholder{color:#b09878}
select{cursor:pointer}
textarea{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.photo-upload{border:1px dashed #c9b09a;border-radius:6px;cursor:pointer;overflow:hidden;min-height:80px;display:flex;align-items:center;justify-content:center;background:#f5efe6;transition:border-color 0.15s}
.photo-upload:hover{border-color:#9b6040}
.photo-upload img{width:100%;max-height:220px;object-fit:cover;display:block}
.photo-placeholder{color:#b09878;font-size:13px;padding:20px;text-align:center}

.type-btns{display:flex;flex-wrap:wrap;gap:7px}
.type-btn{padding:7px 14px;border-radius:20px;border:1px solid #c9b09a;background:transparent;color:#8b6848;font-size:12px;cursor:pointer;font-family:Georgia,serif;text-transform:capitalize;transition:all 0.15s}
.type-btn.active{border-color:#7a1a1a;background:#e8d0c0;color:#7a1a1a}

.aroma-cat{margin-bottom:14px}
.aroma-cat-label{font-size:10px;color:#a08060;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600}
.multi-wrap{display:flex;flex-wrap:wrap;gap:5px}
.multi-btn{padding:4px 10px;border-radius:20px;border:1px solid #c9b09a;background:transparent;color:#8b6848;font-size:12px;cursor:pointer;font-family:Georgia,serif;transition:all 0.15s}
.multi-btn.active{border-color:#7a1a1a;background:#e8d0c0;color:#7a1a1a}
.custom-add{display:flex;gap:8px;margin-top:10px}
.custom-add input{flex:1}

.score-display{font-family:'Cormorant Garamond',Georgia,serif;font-size:14px;color:#7a1a1a;text-transform:none;letter-spacing:0}
input[type=range]{accent-color:#7a1a1a;padding:0;border:none;background:none;width:100%}
.range-labels{display:flex;justify-content:space-between;font-size:9px;color:#b09878;margin-top:3px}

.dup-warning{background:#fdf5e4;border:1px solid #c9a03a;border-radius:6px;padding:14px 18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start}
.dup-icon{font-size:20px;flex-shrink:0}
.dup-title{font-size:13px;color:#8b6010;font-weight:600;margin-bottom:3px}
.dup-sub{font-size:12px;color:#a08040}
.dup-link{background:none;border:none;color:#8b6010;font-size:12px;cursor:pointer;padding:0;text-decoration:underline;margin-top:5px;font-family:Georgia,serif;display:block}

.detail-hero{margin-bottom:20px}
.detail-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:30px;color:#7a1a1a;font-weight:400}
.detail-meta{font-size:14px;color:#8b6848;margin-top:3px}
.detail-date{font-size:12px;color:#b09878;margin-top:3px}
.score-box{background:#ede3d6;border:1px solid #c9b09a;border-radius:6px;padding:14px 22px;margin-bottom:18px;display:flex;align-items:center;gap:18px}
.score-big-num{font-family:'Cormorant Garamond',Georgia,serif;font-size:52px;color:#7a1a1a;font-weight:300;line-height:1}
.score-label-sm{font-size:10px;color:#a08060;text-transform:uppercase;letter-spacing:0.1em}
.detail-section{background:#ede3d6;border:1px solid #d9c8b4;border-radius:6px;padding:18px 20px;margin-bottom:12px}
.detail-section h4{font-family:'Cormorant Garamond',Georgia,serif;color:#8b6848;font-size:12px;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px}
.detail-row{display:flex;gap:12px;margin-bottom:8px;border-bottom:1px solid #d9c8b4;padding-bottom:8px}
.detail-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.dl{font-size:10px;color:#a08060;text-transform:uppercase;letter-spacing:0.1em;width:130px;flex-shrink:0;padding-top:2px;font-family:'Cormorant Garamond',Georgia,serif;font-weight:600}
.dv{font-size:13px;color:#3a2218;flex:1}

.connecting{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px}
.connecting-text{font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;color:#a08060;letter-spacing:0.08em}
.error-state{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;padding:30px;text-align:center}
.error-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;color:#7a1a1a}
.error-sub{font-size:13px;color:#a08060;max-width:400px;line-height:1.7}
.error-steps{background:#ede3d6;border:1px solid #c9b09a;border-radius:6px;padding:16px 20px;text-align:left;max-width:420px;width:100%}
.error-steps li{font-size:13px;color:#8b6848;margin-bottom:8px;padding-left:4px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div class="connecting"><div style="font-size:36px">🍷</div><div class="connecting-text">Connecting to your cellar...</div></div>
</div>

<script>
// ====================================================
// 🍷 TASTENOTE - YOUR FIREBASE CONFIG
// ====================================================
// To set up YOUR OWN personal Winepal:
// 1. Go to console.firebase.google.com
// 2. Create a new project & add a web app
// 3. Create a Firestore database (Simple / test mode)
// 4. Replace every value below with your own config
// ====================================================
firebase.initializeApp({
  apiKey:            "AIzaSyBUXQ5xp9y1iPuTUqrztKCuCswU4oNNW1U",
  authDomain:        "winepal-universal.firebaseapp.com",
  projectId:         "winepal-universal",
  storageBucket:     "winepal-universal.firebasestorage.app",
  messagingSenderId: "542130577160",
  appId:             "1:542130577160:web:dab5efc74bd3423bc4d6bd"
});
// ====================================================
const db = firebase.firestore();

// ── Constants ─────────────────────────────────────────────
const WINE_TYPES = ['red','white','rosé','sparkling','fortified'];
const COLOURS = {
  red:['Purple','Ruby','Garnet','Tawny','Brown'],
  white:['Lemon-green','Lemon','Gold','Amber','Brown'],
  rosé:['Pink','Salmon','Copper','Orange'],
  sparkling:['Lemon-green','Lemon','Gold','Pink','Salmon'],
  fortified:['Pale gold','Gold','Amber','Tawny','Brown']
};
const FAULTS = ['Clean','TCA / Corked','Oxidised','Reduced','Volatile acidity','Brettanomyces'];
const AROMAS_PRIMARY = {
  'Green Fruit':['Apple','Pear','Gooseberry','Quince'],
  'Citrus':['Lemon','Lime','Grapefruit','Orange zest','Bergamot'],
  'Stone Fruit':['Peach','Apricot','Nectarine','Plum','Cherry'],
  'Tropical':['Lychee','Mango','Passion fruit','Pineapple','Banana','Guava'],
  'Red Fruit':['Strawberry','Raspberry','Redcurrant','Cranberry','Pomegranate'],
  'Black Fruit':['Blackcurrant','Blackberry','Blueberry','Black cherry','Sloe'],
  'Dried Fruit':['Fig','Prune','Raisin','Sultana','Dried apricot'],
  'Floral':['Rose','Violet','Blossom','Elderflower','Jasmine','Geranium','Iris'],
  'Herbal':['Grass','Cut hay','Mint','Eucalyptus','Fennel','Thyme','Lavender'],
  'Vegetal':['Green pepper','Asparagus','Tomato leaf','Olive'],
  'Spice':['Black pepper','White pepper','Liquorice','Ginger','Cinnamon']
};
const AROMAS_SECONDARY = {
  'Yeast':['Bread dough','Brioche','Biscuit','Pastry','Toast','Beer'],
  'Malolactic':['Butter','Cream','Yoghurt','Cheese']
};
const AROMAS_TERTIARY = {
  'Oak':['Vanilla','Clove','Nutmeg','Cedar','Pencil shavings','Charred wood','Smoke','Coconut','Dill'],
  'Oxidative':['Almond','Hazelnut','Walnut','Coffee','Caramel','Toffee','Chocolate','Treacle'],
  'Bottle Age':['Petrol / Kerosene','Honey','Toast','Mushroom','Forest floor','Leather','Earth','Tobacco','Game','Truffle']
};
const TANNIN_TEXTURES = ['Silky','Smooth','Rounded','Chalky','Grippy','Firm','Coarse','Harsh','Drying'];
const COMPLEXITY = ['Simple','Moderate','Complex','Very complex'];
const BALANCE = ['Unbalanced','Slightly unbalanced','Balanced','Very well balanced'];
const TYPICITY = ['Atypical','Somewhat typical','Typical','Highly typical'];
const STYLE = ['Lean / Elegant','Medium-bodied','Rich / Full'];

// ── State ─────────────────────────────────────────────────
let currentUser = null;
let notes = [];
let customAromas = [];
let view = 'list';
let editId = null;
let selectedId = null;
let searchVal = '';
let sortBy = 'date';
let form = {};
let duplicate = null;
let saving = false;
let unsub = null;

// ── Collection helpers (scoped per user) ──────────────────
function notesCol() {
  return db.collection('users').doc(currentUser.uid).collection('notes');
}
function settingsDoc() {
  return db.collection('users').doc(currentUser.uid).collection('settings').doc('aromas');
}

function emptyForm() {
  return {
    wineName:'',vintage:'',region:'',grape:'',producer:'',wineType:'red',photo:'',
    clarity:'',intensity_app:'',colour:'',viscosity:'',effervescence:'',
    condition:'Clean',faults:[],
    intensity_nose:'',aroma_primary:[],aroma_secondary:[],aroma_tertiary:[],aroma_custom:[],
    development:'',
    sweetness:'',acidity:'',tannin:'',tannin_texture:'',alcohol:'',body:'',mousse:'',
    intensity_palate:'',flavour_chars:[],finish:'',
    complexity:'',balance:'',oak_influence:'',flavour_custom:[],
    quality:'',readiness:'',potential:'',typicity:'',style:'',overall:'',score:'75',
    date:new Date().toISOString().split('T')[0]
  };
}

// ── Firebase ──────────────────────────────────────────────
function initListener() {
  if (unsub) unsub();
  unsub = notesCol().orderBy('createdAt','desc').onSnapshot(snap => {
    notes = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (view==='list') render();
  }, err => {
    showError(err);
  });
  settingsDoc().get().then(doc => {
    if (doc.exists) customAromas = doc.data().list || [];
  }).catch(()=>{});
}

async function doSave() {
  if (!form.wineName || saving) return;
  saving = true;
  render();
  try {
    const data = {...form, updatedAt: firebase.firestore.FieldValue.serverTimestamp()};
    // Don't store 'id' field in Firestore document
    delete data.id;
    if (editId) {
      await notesCol().doc(editId).update(data);
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await notesCol().add(data);
    }
    if (customAromas.length) {
      await settingsDoc().set({list:customAromas});
    }
    form = emptyForm(); editId = null; duplicate = null; view = 'list';
  } catch(e) {
    alert('Could not save. Check your internet connection.\n\n'+e.message);
  }
  saving = false;
  render();
}

async function doDelete(id) {
  if (!confirm('Delete this tasting note? This cannot be undone.')) return;
  try {
    await notesCol().doc(id).delete();
  } catch(e) { alert('Could not delete: '+e.message); return; }
  view = 'list'; render();
}

// ── Photo ─────────────────────────────────────────────────
async function compressPhoto(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 600;
        let w=img.width, h=img.height;
        if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
        else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
        const c=document.createElement('canvas');
        c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',0.72));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

// ── Utils ─────────────────────────────────────────────────
function dotColor(t){return{red:'#8b1a1a',white:'#c9a83a',rosé:'#c97a8a',sparkling:'#d4c060',fortified:'#8b6010'}[t]||'#8b7060';}
function qColor(q){return{'Outstanding':'#c9a87a','Excellent':'#a0c87a','Very good':'#90c87a','Good':'#7ab8c8','Acceptable':'#c8b07a','Poor':'#c87a7a'}[q]||'#6b5040';}
function qualityLabel(s){if(s>=95)return'Outstanding';if(s>=87)return'Excellent';if(s>=83)return'Very good';if(s>=80)return'Good';if(s>=70)return'Acceptable';return'Poor';}

function getSorted() {
  let r = notes.filter(n =>
    (n.wineName||'').toLowerCase().includes(searchVal.toLowerCase())||
    (n.region||'').toLowerCase().includes(searchVal.toLowerCase())||
    (n.grape||'').toLowerCase().includes(searchVal.toLowerCase())||
    (n.producer||'').toLowerCase().includes(searchVal.toLowerCase())
  );
  if(sortBy==='alpha') r.sort((a,b)=>a.wineName.localeCompare(b.wineName));
  else if(sortBy==='score') r.sort((a,b)=>(parseInt(b.score)||0)-(parseInt(a.score)||0));
  return r;
}

function checkDup(name) {
  duplicate = name.length>2 ? (notes.find(n=>n.wineName.toLowerCase().includes(name.toLowerCase())&&n.id!==editId)||null) : null;
}

// ── Actions ───────────────────────────────────────────────
function goNew(){form=emptyForm();editId=null;duplicate=null;view='form';render();}
function goList(){view='list';editId=null;render();}
function goEdit(id){
  const n=notes.find(x=>x.id===id);if(!n)return;
  form={...emptyForm(),...n};editId=id;duplicate=null;view='form';render();
}
function openNote(id){selectedId=id;view='detail';render();}
function searchCellarTracker(){
  const n=notes.find(x=>x.id===selectedId);
  if(!n) return;
  const q=encodeURIComponent('site:cellartracker.com '+n.wineName+(n.vintage?' '+n.vintage:''));
  window.open('https://www.google.com/search?q='+q,'_blank');
}
function searchWineSearcher(){
  const n=notes.find(x=>x.id===selectedId);
  if(!n) return;
  const q=encodeURIComponent(n.wineName+(n.vintage?' '+n.vintage:''));
  window.open('https://www.wine-searcher.com/find/'+q,'_blank');
}
function cancelForm(){form=emptyForm();editId=null;duplicate=null;view='list';render();}
function onSearch(v){searchVal=v;render();}
function setSort(s){sortBy=s;render();}

function setType(t){form.wineType=t;form.colour='';render();}
function setField(f,v){
  form[f]=v;
  if(f==='wineName'){
    checkDup(v);
    updateDupBanner();
    const btn=document.querySelector('.btn-save');
    if(btn) btn.disabled=!v;
  }
}
function setScore(v){
  form.score=v;
  const el=document.querySelector('.score-display');
  if(el) el.textContent=`(${v}/100)`;
}
function toggleArr(field,val){
  if(!Array.isArray(form[field])) form[field]=[];
  const i=form[field].indexOf(val);
  if(i>-1) form[field].splice(i,1); else form[field].push(val);
  if(event&&event.currentTarget) event.currentTarget.classList.toggle('active');
}
function updateDupBanner(){
  const ex=document.querySelector('.dup-warning');
  const wrap=document.querySelector('.form-content');
  if(!wrap) return;
  if(duplicate&&!ex){
    const d=document.createElement('div');d.className='dup-warning';
    d.innerHTML=`<span class="dup-icon">⚠️</span><div><div class="dup-title">You may have tasted this before</div><div class="dup-sub">"${duplicate.wineName}" tasted on ${duplicate.date||'?'}</div><button class="dup-link" onclick="openNote('${duplicate.id}')">View that note →</button></div>`;
    wrap.insertBefore(d,wrap.firstChild);
  } else if(!duplicate&&ex){ex.remove();}
}
async function handlePhoto(input){
  if(!input.files[0]) return;
  const comp=await compressPhoto(input.files[0]);
  form.photo=comp;
  const img=document.querySelector('.photo-preview');
  const ph=document.querySelector('.photo-placeholder');
  if(img){img.src=comp;img.style.display='block';}
  if(ph) ph.style.display='none';
}
function addCustomAroma(){

function inp(id,lbl,val,ph,type='text',req=false){
  return `<div class="field"><label>${lbl}${req?'<span class="req">*</span>':''}</label>

function multiGroup(field,lbl,groups){
  return `<div class="field"><label>${lbl}</label>${
    Object.entries(groups).map(([cat,items])=>
      `<div class="aroma-cat"><div class="aroma-cat-label">${cat}</div><div class="multi-wrap">${
        items.map(o=>`<button class="multi-btn${(form[field]||[]).includes(o)?' active':''}" onclick="toggleArr('${field}','${o.replace(/'/g,"&#39;")}')">${o}</button>`).join('')
      }</div></div>`
    ).join('')
  }</div>`;
}
function detailRow(lbl,val){
  if(!val||(Array.isArray(val)&&!val.length)) return '';
  return `<div class="detail-row"><div class="dl">${lbl}</div><div class="dv">${Array.isArray(val)?val.join(', '):val}</div></div>`;
}

function importCSV(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.csv';
  input.style.display='none';
  document.body.appendChild(input);
  input.onchange=async e=>{
    const file=e.target.files[0];
    if(!file) return;
    const text=await file.text();
    const lines=text.split('\n').filter(l=>l.trim());
    if(lines.length<2){alert('No data found in file.');return;}
    const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
    let imported=0, failed=0;
    for(let i=1;i<lines.length;i++){
      try{
        // Handle quoted fields with commas inside
        const vals=[];
        let cur='',inQ=false;
        for(const ch of lines[i]){
          if(ch==='"'){inQ=!inQ;}
          else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
          else cur+=ch;
        }
        vals.push(cur.trim());
        const get=(name)=>{
          const idx=headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase()));
          return idx>=0?(vals[idx]||'').replace(/^"|"$/g,'').trim():'';
        };
        const getArr=(name)=>{
          const v=get(name);
          return v?v.split(',').map(x=>x.trim()).filter(Boolean):[];
        };
        const note={
          wineName:get('Wine Name'),
          producer:get('Producer'),
          vintage:get('Vintage'),
          region:get('Region'),
          grape:get('Grape'),
          wineType:get('Type'),
          date:get('Date')||new Date().toISOString().split('T')[0],
          score:parseInt(get('Score'))||0,
          quality:qualityLabel(parseInt(get('Score'))||0),
          style:get('Style'),
          clarity:get('Clarity'),
          intensity_app:get('Colour Intensity'),
          colour:get('Colour'),
          viscosity:get('Viscosity'),
          effervescence:get('Effervescence'),
          condition:get('Nose Condition'),
          intensity_nose:get('Nose Intensity'),
          aroma_primary:getArr('Aromas'),
          aroma_secondary:[],aroma_tertiary:[],aroma_custom:[],
          development:get('Development'),
          sweetness:get('Sweetness'),
          acidity:get('Acidity'),
          tannin:get('Tannin'),
          tannin_texture:get('Tannin Texture'),
          mousse:get('Mousse'),
          alcohol:get('Alcohol'),
          body:get('Body'),
          intensity_palate:get('Flavour Intensity'),
          flavour_chars:getArr('Flavours'),
          flavour_custom:[],
          finish:get('Finish'),
          complexity:get('Complexity'),
          balance:get('Balance'),
          oak_influence:get('Oak Influence'),
          typicity:get('Typicity'),
          readiness:get('Readiness'),
          potential:parseInt(get('Ageing'))||'',
          overall:get('Overall'),
          photo:'',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!note.wineName){failed++;continue;}
        await notesCol().add(note);
        imported++;
      }catch(e){failed++;console.error('Row '+i+' failed:',e,note);}
    }
    alert(`Import complete!\n✅ ${imported} notes imported\n${failed>0?'⚠️ '+failed+' rows skipped — open browser console for details':''}`);
    document.body.removeChild(input);
  };
  input.click();
}

function exportCSV(){
  if(!notes.length){alert('No notes to export.');return;}
  const cols=['Date','Wine Name','Producer','Vintage','Region','Grape','Type','Score','Quality','Style',
    'Clarity','Colour Intensity','Colour','Viscosity','Effervescence',
    'Nose Condition','Nose Intensity','Aromas','Development',
    'Sweetness','Acidity','Tannin','Tannin Texture','Mousse','Alcohol','Body',
    'Flavour Intensity','Flavours','Finish','Complexity','Balance','Oak Influence',
    'Typicity','Readiness','Ageing Potential','Overall Notes'];
  const esc=v=>{
    if(Array.isArray(v)) v=v.join(', ');
    v=String(v||'');
    if(v.includes(',')||v.includes('"')||v.includes('\n')) v='"'+v.replace(/"/g,'""')+'"';
    return v;
  };
  const rows=notes.map(n=>[
    n.date,n.wineName,n.producer,n.vintage,n.region,n.grape,n.wineType,n.score,n.quality,n.style,
    n.clarity,n.intensity_app,n.colour,n.viscosity,n.effervescence,
    n.condition,n.intensity_nose,
    [...(n.aroma_primary||[]),...(n.aroma_secondary||[]),...(n.aroma_tertiary||[]),...(n.aroma_custom||[])],
    n.development,
    n.sweetness,n.acidity,n.tannin,n.tannin_texture,n.mousse,n.alcohol,n.body,
    n.intensity_palate,[...(n.flavour_chars||[]),...(n.flavour_custom||[])],n.finish,n.complexity,n.balance,n.oak_influence,
    n.typicity,n.readiness,n.potential?n.potential+' years':'',n.overall
  ].map(esc).join(','));
  const csv=[cols.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='TasteNote-notes-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

function renderList(){
  const filtered=getSorted();
  const sortBtns=['date','alpha','score'].map(s=>
    `<button class="sort-btn${sortBy===s?' active':''}" onclick="setSort('${s}')">${{date:'Recent',alpha:'A–Z',score:'Score'}[s]}</button>`).join('');

  const cards=filtered.length===0
    ?(notes.length===0
      ?`<div class="empty-state"><div class="empty-big">🍷</div><div class="empty-title">Your cellar awaits</div><div class="empty-sub">Tap + New Note to log your first tasting</div></div>`
      :`<div class="empty-state"><div class="empty-sub">No wines match "${searchVal}"</div></div>`)
    :filtered.map(n=>{
      const dot=dotColor(n.wineType);
      const meta=[n.vintage,n.grape,n.region].filter(Boolean).join(' · ');
      const allA=[...(n.aroma_primary||[]),...(n.aroma_secondary||[]),...(n.aroma_tertiary||[]),...(n.aroma_custom||[])];
      const aStr=allA.slice(0,4).join(', ')+(allA.length>4?'...':'');
      return `<div class="wine-card" onclick="openNote('${n.id}')">
        ${n.photo?`<div class="card-photo"><img src="${n.photo}" alt=""></div>`:`<div class="card-dot-wrap"><div class="dot" style="background:${dot}"></div></div>`}
        <div class="card-body">
          <div class="card-name">${n.wineName}</div>
          ${meta?`<div class="card-meta">${meta}</div>`:''}
          ${aStr?`<div class="card-aromas">${aStr}</div>`:''}
        </div>
        <div class="card-right">
          ${n.score?`<div class="card-score">${n.score}</div>`:''}
          ${n.quality?`<div class="card-quality" style="color:${qColor(n.quality)}">${n.quality}</div>`:''}
          <div class="card-date">${n.date||''}</div>
        </div>
      </div>`;
    }).join('');

  return `<div class="header">
    <div class="header-top">
      <div><h1 class="app-title">🍷 TasteNote</h1><p class="app-sub">WSET · ${notes.length} wine${notes.length!==1?'s':''} tasted</p><p style="font-size:10px;color:#b09878;margin-top:2px;letter-spacing:0.04em">Signed in as ${currentUser.displayName||currentUser.email}</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="downloadTemplate()">📋 Template</button>
        <button class="btn" onclick="importCSV()">⬆ Import</button>
        <button class="btn" onclick="exportCSV()">⬇ Export</button>
        <button class="btn-primary" onclick="goNew()">+ New Note</button>
        <button class="btn" onclick="doSignOut()" style="font-size:12px;padding:7px 12px;color:#8b6848">Sign out</button>
      </div>
    </div>
    <input class="search-bar" placeholder="Search wines, regions, grapes, producers..." value="${searchVal}" oninput="onSearch(this.value)">
    <div class="sort-bar">${sortBtns}</div>
  </div>
  <div class="content">${cards}</div>`;
}

    <!-- IV: Conclusions -->
    <div class="section">
      <div class="section-head"><span class="sec-num">IV</span><div><div class="sec-title">Conclusions</div><div class="sec-sub">Your overall assessment</div></div></div>
      ${sel('quality','Quality Level',form.quality,['Poor','Acceptable','Good','Very good','Outstanding'])}
      ${sel('style','Style',form.style,STYLE)}
      ${sel('typicity','Typicity',form.typicity,TYPICITY)}
      ${sel('readiness','Readiness for Drinking',form.readiness,['Too young — needs time','Can drink now but has potential','Drink now — at peak','Past its best'])}
      ${inp('potential','Ageing Potential (years)',form.potential,'e.g. 10','number')}
      <div class="field">
        <label>Personal Score <span class="score-display">(${form.score||'75'}/100)</span></label>
        <input type="range" min="50" max="100" value="${form.score||75}" oninput="setScore(this.value)">
        <div class="range-labels"><span>50 Faulty</span><span>70 Acceptable</span><span>80 Good</span><span>87 Excellent</span><span>95+ Outstanding</span></div>
      </div>
      <div class="field">
        <label>Overall Impressions & Notes</label>
        <textarea rows="4" placeholder="Your personal thoughts — food pairings, where you had it, what made it special..." oninput="setField('overall',this.value)">${form.overall||''}</textarea>
      </div>
    </div>

    <button class="btn-primary" style="width:100%;padding:14px" id="bottom-save-btn" onclick="doSave()">${saving?'Saving...':isEdit?'Update Note':'Save Tasting Note'}</button>
  </div>`;
  // Set disabled state after render
  setTimeout(()=>{
    const b=document.getElementById('bottom-save-btn');
    if(b) b.disabled=(!form.wineName||saving);
  },0);
}

function renderDetail(){
  const n=notes.find(x=>x.id===selectedId);
  if(!n){view='list';return renderList();}
  const dot=dotColor(n.wineType);
  const meta=[n.vintage,n.grape,n.region].filter(Boolean).join(' · ');
  const allA=[...(n.aroma_primary||[]),...(n.aroma_secondary||[]),...(n.aroma_tertiary||[]),...(n.aroma_custom||[])];

  return `<div class="header">
    <div class="header-top">
      <button class="btn" onclick="goList()">← Back</button>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="searchCellarTracker()">🔍 CellarTracker</button>
        <button class="btn" onclick="searchWineSearcher()">💰 Wine-Searcher</button>
        <button class="btn" onclick="goEdit('${n.id}')">✏️ Edit</button>
        <button class="btn-danger" onclick="doDelete('${n.id}')">Delete</button>
      </div>
    </div>
  </div>
  <div class="content">
    ${n.photo?`<img src="${n.photo}" style="width:100%;max-height:420px;object-fit:contain;background:#e8dece;border-radius:6px;margin-bottom:20px">`:''}
    <div class="detail-hero">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <div class="dot" style="background:${dot};width:11px;height:11px"></div>
        <div class="detail-name">${n.wineName}</div>
      </div>
      ${n.producer?`<div style="font-size:14px;color:#8b7060;margin-bottom:2px">${n.producer}</div>`:''}
      <div class="detail-meta">${meta}</div>
      <div class="detail-date">${n.date||''}</div>
    </div>

    ${n.score?`<div class="score-box">
      <div class="score-big-num">${n.score}<span style="font-size:18px;color:#4a3028">/100</span></div>
      <div>
        <div class="score-label-sm">Personal Score</div>
        ${n.quality?`<div style="font-size:15px;color:${qColor(n.quality)};margin-top:3px">${n.quality}</div>`:''}
        ${n.style?`<div style="font-size:12px;color:#6b5040;margin-top:2px">${n.style}</div>`:''}
      </div>
    </div>`:''}

    <div class="detail-section"><h4>Appearance</h4>
      ${detailRow('Clarity',n.clarity)}${detailRow('Intensity',n.intensity_app)}${detailRow('Colour',n.colour)}${detailRow('Viscosity',n.viscosity)}${detailRow('Effervescence',n.effervescence)}
    </div>
    <div class="detail-section"><h4>Nose</h4>
      ${detailRow('Condition',n.condition)}${detailRow('Intensity',n.intensity_nose)}
      ${allA.length?detailRow('Aromas',allA):''}
      ${detailRow('Development',n.development)}
    </div>
    <div class="detail-section"><h4>Palate</h4>
      ${detailRow('Sweetness',n.sweetness)}${detailRow('Acidity',n.acidity)}${detailRow('Tannin Level',n.tannin)}${detailRow('Tannin Texture',n.tannin_texture)}${detailRow('Mousse',n.mousse)}${detailRow('Alcohol',n.alcohol)}${detailRow('Body',n.body)}${detailRow('Flavour Intensity',n.intensity_palate)}${detailRow('Flavours',n.flavour_chars)}${detailRow('Finish',n.finish)}${detailRow('Complexity',n.complexity)}${detailRow('Balance',n.balance)}${detailRow('Oak Influence',n.oak_influence)}
    </div>
    <div class="detail-section"><h4>Conclusions</h4>
      ${detailRow('Quality',n.quality)}${detailRow('Style',n.style)}${detailRow('Typicity',n.typicity)}${detailRow('Readiness',n.readiness)}${n.potential?detailRow('Ageing Potential',n.potential+' years'):''}${detailRow('Notes',n.overall)}
    </div>
    <div style="margin-bottom:50px"></div>
  </div>`;
}

// ── PWA ───────────────────────────────────────────────────
(function(){
  const icon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="80" fill="#7a1a1a"/><text x="256" y="400" font-size="340" text-anchor="middle" font-family="serif">🍷</text></svg>`;
  const manifest = {
    name:'TasteNote',short_name:'TasteNote',
    description:'WSET-style personal wine tasting notes',
    start_url:'./',display:'standalone',
    background_color:'#f5efe6',theme_color:'#7a1a1a',
    orientation:'portrait-primary',
    icons:[{src:'data:image/svg+xml,'+encodeURIComponent(icon),sizes:'512x512',type:'image/svg+xml',purpose:'any'}]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const link=document.createElement('link');
  link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
})();

// ── Init ──────────────────────────────────────────────────
firebase.auth().onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    try {
      initListener();
      render();
    } catch(e) {
      showError(e);
    }
  } else {
    if (unsub) { unsub(); unsub = null; }
    notes = [];
    document.getElementById('app').innerHTML = renderLogin();
  }
});
</script>
</body>
</html>
